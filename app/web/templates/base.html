<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetWatcher for UniFi</title>
    <link rel="preload" href="/static/fonts/inter-latin-400.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/static/fonts/material-symbols-outlined.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/static/app.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="/static/app.js" defer></script>
</head>
<body class="font-sans min-h-screen flex flex-col">
    <!-- Top Navigation -->
    <nav class="glass-panel sticky top-0 z-50 shadow-md">
        <div class="max-w-[1440px] mx-auto px-4 lg:px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="flex items-center justify-center w-8 h-8 rounded-lg bg-primary/10 text-primary">
                    <span class="material-symbols-outlined text-xl">router</span>
                </div>
                <a href="/" class="text-xl font-bold tracking-tight text-on-surface">NetWatcher</a>
            </div>
            <div id="desktop-nav-links" class="hidden md:flex space-x-8">
                {% include "partials/nav_desktop_links.html" %}
            </div>
            <!-- Mobile Menu Button -->
            <div class="md:hidden">
                <button class="text-on-surface hover:text-primary">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-[1440px] mx-auto p-4 lg:p-6 mt-4">
        {% block content %}{% endblock %}
    </main>

    {% include "partials/nav_mobile.html" %}
</body>
</html>

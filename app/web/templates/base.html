<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetWatcher for UniFi</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link href="/static/app.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans min-h-screen">
    <nav class="bg-blue-800 p-4 text-white shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tight">NetWatcher</a>
            <div class="space-x-6">
                <a href="/" class="hover:text-blue-300 font-semibold">Dashboard</a>
                <a href="/unknown" class="hover:text-blue-300 font-semibold">Unknown Devices</a>
                <a href="/devices" class="hover:text-blue-300 font-semibold">Inventory</a>
                <a href="/notifications" class="hover:text-blue-300 font-semibold">Alerts</a>
            </div>
        </div>
    </nav>
    <main class="container mx-auto p-6 mt-4 bg-white rounded shadow-sm min-h-[500px]">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
